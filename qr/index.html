<style>
  :root{
    --ink:#1c1c1a;
    --paper:#f6f3ec;
    --line:#d8d2c4;
    --accent:#2f6f4f;
    --accent-dark:#234f39;
    --muted:#7a756a;
    --error:#b5402a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--paper);
    font-family:'Segoe UI',-apple-system,'Pretendard','Malgun Gothic',sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
  }
  .card{
    width:100%;
    max-width:460px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 30px 26px;
    box-shadow:0 6px 24px rgba(0,0,0,0.06);
  }
  h1{
    margin:0 0 4px;
    font-size:21px;
    letter-spacing:-0.02em;
    display:flex;
    align-items:center;
    gap:10px;
  }
  h1 img{
    width:32px;
    height:32px;
    border-radius:7px;
    flex-shrink:0;
  }
  .sub{
    margin:0 0 18px;
    font-size:13px;
    color:var(--muted);
  }
  .tabs{
    display:flex;
    gap:6px;
    margin-bottom:20px;
    border-bottom:1px solid var(--line);
  }
  .tab{
    flex:1;
    padding:10px 0;
    text-align:center;
    font-size:14px;
    font-weight:600;
    color:var(--muted);
    cursor:pointer;
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  .tab.active{
    color:var(--accent-dark);
    border-bottom-color:var(--accent);
  }
  .reset-btn{
    flex:0 0 auto !important;
    align-self:center;
    margin-bottom:6px;
    margin-left:4px;
    padding:5px 12px;
    font-size:12px;
    font-weight:600;
    color:var(--muted);
    border-color:var(--line);
    background:#fff;
  }
  .reset-btn:hover{
    color:var(--error);
    border-color:var(--error);
  }
  .panel{display:none;}
  .panel.active{display:block;}

  label{
    display:block;
    font-size:12.5px;
    color:var(--muted);
    margin-bottom:6px;
  }
  textarea{
    width:100%;
    min-height:64px;
    resize:vertical;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:14px;
    font-family:inherit;
    color:var(--ink);
    background:#fdfcf9;
  }
  textarea:focus, button:focus-visible, .dropzone:focus-visible{outline:2px solid var(--accent); outline-offset:1px;}
  .row{
    display:flex;
    gap:10px;
    margin-top:14px;
  }
  button{
    flex:1;
    padding:10px 14px;
    border-radius:8px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s, transform .05s;
  }
  button:hover{background:#f1efe8;}
  button:active{transform:translateY(1px);}
  button.primary{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  button.primary:hover{background:var(--accent-dark);}
  button:disabled{opacity:.5; cursor:default;}
  .status{
    min-height:18px;
    font-size:12.5px;
    margin-top:8px;
    color:var(--muted);
    word-break:break-all;
  }
  .status.error{color:var(--error);}
  .status.ok{color:var(--accent-dark);}
  .qr-wrap{
    margin-top:22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }
  #qrcode{
    padding:14px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    display:none;
  }
  #qrcode canvas{display:block;}
  .size-row{
    display:flex;
    gap:8px;
    align-items:center;
    margin-top:14px;
    font-size:12.5px;
    color:var(--muted);
  }
  select{
    padding:6px 8px;
    border-radius:6px;
    border:1px solid var(--line);
    font-size:13px;
    font-family:inherit;
    background:#fdfcf9;
  }
  .download-btn{
    width:100%;
    display:none;
  }

  /* decode panel */
  .dropzone{
    border:2px dashed var(--line);
    border-radius:10px;
    padding:26px 14px;
    text-align:center;
    font-size:13px;
    color:var(--muted);
    cursor:pointer;
    background:#fdfcf9;
  }
  .dropzone.drag{
    border-color:var(--accent);
    background:#f1f7f3;
    color:var(--accent-dark);
  }
  .dropzone strong{color:var(--ink);}
  .pastezone{
    margin-top:10px;
    min-height:54px;
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px;
    font-size:13px;
    color:var(--muted);
    background:#fdfcf9;
    cursor:text;
    display:flex;
    align-items:center;
  }
  .pastezone:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
    color:var(--accent-dark);
  }
  .pastezone:empty::before{
    content: attr(data-placeholder);
  }
  #fileInput{display:none;}
  video{
    width:100%;
    border-radius:10px;
    border:1px solid var(--line);
    display:none;
    background:#000;
    object-fit:cover;
  }
  .video-wrap{
    position:relative;
    display:none;
  }
  .video-wrap.active{display:block;}
  .video-wrap video{display:block;}
  .scan-guide{
    position:absolute;
    top:50%;
    left:50%;
    width:62%;
    aspect-ratio:1/1;
    transform:translate(-50%,-50%);
    border:3px solid rgba(255,255,255,0.85);
    border-radius:16px;
    box-shadow:0 0 0 2000px rgba(0,0,0,0.25);
    pointer-events:none;
  }
  .video-hint{
    margin-top:8px;
    font-size:11.5px;
    color:var(--muted);
    text-align:center;
  }
  .zoom-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
    font-size:12.5px;
    color:var(--muted);
  }
  .zoom-row input[type="range"]{
    flex:1;
  }
  .result-box{
    margin-top:16px;
    padding:14px;
    border:1px solid var(--line);
    border-radius:10px;
    background:#fdfcf9;
    display:none;
  }
  .result-box .label{font-size:11.5px;color:var(--muted);margin-bottom:6px;}
  .result-box .text{
    font-size:14px;
    word-break:break-all;
    white-space:pre-wrap;
    margin-bottom:10px;
  }
  .result-box .text a{

const tabs = document.querySelectorAll('.tab');
const panels = {
  gen: document.getElementById('panel-gen'),
  scan: document.getElementById('panel-scan')
};
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    Object.values(panels).forEach(p => p.classList.remove('active'));

/* ---- QR 생성 ---- */
const input = document.getElementById('input');
const shortenBtn = document.getElementById('shortenBtn');
const genBtn = document.getElementById('genBtn');
const genStatus = document.getElementById('genStatus');
const qrBox = document.getElementById('qrcode');
const downloadBtn = document.getElementById('downloadBtn');
const sizeSelect = document.getElementById('sizeSelect');

function setGenStatus(msg, type){
  genStatus.textContent = msg || '';
  genStatus.className = 'status' + (type ? ' ' + type : '');
}

shortenBtn.addEventListener('click', async () => {
  const url = input.value.trim();
  if(!url){
    setGenStatus('먼저 URL을 입력해주세요.', 'error');
    return;
  }
  setGenStatus('줄이는 중...');
  shortenBtn.disabled = true;
  try{
    const res = await fetch('https://is.gd/create.php?format=json&url=' + encodeURIComponent(url));
    if(!res.ok) throw new Error('요청 실패');
    const data = await res.json();
    if(data.shorturl){
      input.value = data.shorturl;
      setGenStatus('단축 완료: ' + data.shorturl, 'ok');
    } else {
      throw new Error(data.errormessage || '알 수 없는 오류');
    }
  } catch(err){
    setGenStatus('URL 단축에 실패했습니다 (인터넷 연결을 확인해주세요). 원래 URL로 QR을 만들 수 있어요.', 'error');
  } finally {
    shortenBtn.disabled = false;
  }
});

genBtn.addEventListener('click', () => {
  const text = input.value.trim();
  if(!text){
    setGenStatus('생성할 텍스트나 URL을 입력해주세요.', 'error');
    return;
  }
  qrBox.innerHTML = '';
  const size = parseInt(sizeSelect.value, 10);
  try{
    new QRCode(qrBox, {
      text: text,
      width: size,
      height: size,
      correctLevel: QRCode.CorrectLevel.M
    });
    qrBox.style.display = 'inline-block';
    downloadBtn.style.display = 'block';
    setGenStatus('QR 코드가 생성되었습니다.', 'ok');
  } catch(err){
    setGenStatus('QR 코드 생성에 실패했습니다.', 'error');
  }
});

downloadBtn.addEventListener('click', () => {
  const canvas = qrBox.querySelector('canvas');
  if(!canvas){
    setGenStatus('다운로드할 QR 코드가 없습니다.', 'error');
    return;
  }
  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)){
    genBtn.click();
  }
});

/* ---- QR 인식 ---- */
const dropzone = document.getElementById('dropzone');
const pastezone = document.getElementById('pastezone');
const fileInput = document.getElementById('fileInput');
const scanStatus = document.getElementById('scanStatus');
const resultBox = document.getElementById('resultBox');
const resultText = document.getElementById('resultText');
const copyBtn = document.getElementById('copyBtn');
const openBtn = document.getElementById('openBtn');
const cameraBtn = document.getElementById('cameraBtn');
const cameraRestartBtn = document.getElementById('cameraRestartBtn');
const zoomRow = document.getElementById('zoomRow');
const zoomSlider = document.getElementById('zoomSlider');
const video = document.getElementById('video');
const videoWrap = document.getElementById('videoWrap');
const videoHint = document.getElementById('videoHint');
const hiddenCanvas = document.getElementById('hiddenCanvas');
const hiddenCtx = hiddenCanvas.getContext('2d');

let cameraStream = null;
let cameraLoopId = null;

function setScanStatus(msg, type){
  scanStatus.textContent = msg || '';
  scanStatus.className = 'status' + (type ? ' ' + type : '');
}

let lastDecodedText = '';
let lastDecodedUrl = null;

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// 텍스트를 분석해서 URL로 볼 수 있으면 정규화된 주소를 돌려줌 (스킴 없으면 https:// 보완)
function detectUrl(text){
  const t = text.trim();
  if(!t || /\s/.test(t)) return null;
  if(/^https?:\/\/[^\s]+$/i.test(t)) return t;
  if(/^www\.[a-z0-9-]+(\.[a-z0-9-]+)+([\/?#].*)?$/i.test(t)) return 'https://' + t;
  if(/^[a-z0-9-]+(\.[a-z0-9-]+)+([\/?#].*)?$/i.test(t) && /\.[a-z]{2,}/i.test(t)) return 'https://' + t;
  return null;
}

function showResult(text){
  lastDecodedText = text;
  lastDecodedUrl = detectUrl(text);
  if(lastDecodedUrl){
    resultText.innerHTML = '<a href="' + escapeHtml(lastDecodedUrl) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(text) + '</a>';
  } else {
    resultText.textContent = text;
  }
  resultBox.style.display = 'block';
  openBtn.style.display = lastDecodedUrl ? 'block' : 'none';
  setScanStatus(lastDecodedUrl ? '인식 완료. 주소를 클릭하면 바로 열 수 있어요.' : '인식 완료.', 'ok');
}

function decodeImageElement(img){
  const w = img.naturalWidth || img.width;
  const h = img.naturalHeight || img.height;
  if(!w || !h){
    setScanStatus('이미지를 읽을 수 없습니다.', 'error');
    return;
  }
  hiddenCanvas.width = w;
  hiddenCanvas.height = h;
  hiddenCtx.drawImage(img, 0, 0, w, h);
  const imageData = hiddenCtx.getImageData(0, 0, w, h);
  const code = jsQR(imageData.data, w, h);
  if(code && code.data){
    showResult(code.data);
  } else {
    resultBox.style.display = 'none';
    setScanStatus('QR 코드를 찾지 못했습니다. 다른 이미지를 시도해보세요.', 'error');
  }
}

function decodeFile(file){
  if(!file || !file.type.startsWith('image/')){
    setScanStatus('이미지 파일을 사용해주세요.', 'error');
    return;
  }
  setScanStatus('인식 중...');
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => decodeImageElement(img);
    img.onerror = () => setScanStatus('이미지를 불러올 수 없습니다.', 'error');
    img.src = e.target.result;
  };
  reader.onerror = () => setScanStatus('파일을 읽을 수 없습니다.', 'error');
  reader.readAsDataURL(file);
}

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' || e.key === ' ') fileInput.click();
});
fileInput.addEventListener('change', () => {
  if(fileInput.files[0]) decodeFile(fileInput.files[0]);
});

['dragenter','dragover'].forEach(evt => {
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropzone.classList.add('drag');
  });
});
['dragleave','drop'].forEach(evt => {
  dropzone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropzone.classList.remove('drag');
  });
});
dropzone.addEventListener('drop', (e) => {
  const file = e.dataTransfer.files[0];
  if(file) decodeFile(file);
});

function handlePasteEvent(e){
  const items = e.clipboardData && e.clipboardData.items;
  if(!items) return false;
  for(const item of items){
    if(item.type.startsWith('image/')){
      const file = item.getAsFile();
      if(file) decodeFile(file);
      return true;
    }
  }
  return false;
}

pastezone.addEventListener('paste', (e) => {
  e.preventDefault();
  e.stopPropagation();
  const found = handlePasteEvent(e);
  pastezone.innerHTML = '';
  if(!found) setScanStatus('클립보드에서 이미지를 찾지 못했습니다.', 'error');
});

document.addEventListener('paste', (e) => {
  if(!panels.scan.classList.contains('active')) return;
  if(e.defaultPrevented) return; // pastezone에서 이미 처리한 경우 중복 방지
  handlePasteEvent(e);
});

copyBtn.addEventListener('click', async () => {
  try{
    await navigator.clipboard.writeText(lastDecodedText);
    setScanStatus('복사되었습니다.', 'ok');
  } catch(err){
    setScanStatus('복사에 실패했습니다.', 'error');
  }
});

openBtn.addEventListener('click', () => {
  if(lastDecodedUrl){
    window.open(lastDecodedUrl, '_blank', 'noopener,noreferrer');
  }
});

/* 카메라 스캔 */
let cameraTrack = null;

async function startCamera(){
  try{
    // 해상도를 강제하지 않음 — 일부 폰에서 해상도 조건 때문에 자동초점이 안 되는
    // 망원/매크로 렌즈가 선택되는 경우가 있어, 기기 기본 후면 카메라(보통 메인 렌즈)를 그대로 사용
    try{
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: 'environment' } }
      });
    } catch(e){
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
    }
    cameraTrack = cameraStream.getVideoTracks()[0];
    video.srcObject = cameraStream;
    videoWrap.classList.add('active');
    videoHint.style.display = 'block';
    cameraRestartBtn.style.display = 'block';
    await video.play();
    // 일부 기기는 트랙이 막 시작된 직후에는 초점 제약이 바로 적용되지 않아 약간 대기
    await new Promise((r) => setTimeout(r, 350));
    await tryEnableContinuousFocus();
    setupZoomControl();
    cameraBtn.textContent = '카메라 중지';
    setScanStatus('카메라를 비춰주세요... (15~20cm 거리 권장)');
    cameraLoop();
  } catch(err){
    setScanStatus('카메라를 사용할 수 없습니다 (권한을 확인해주세요).', 'error');
  }
}

function setupZoomControl(){
  if(!cameraTrack || !cameraTrack.getCapabilities){
    zoomRow.style.display = 'none';
    return;
  }
  try{
    const caps = cameraTrack.getCapabilities();
    if(caps.zoom && caps.zoom.max > caps.zoom.min){
      zoomSlider.min = caps.zoom.min;
      zoomSlider.max = caps.zoom.max;
      zoomSlider.step = caps.zoom.step || 0.1;
      zoomSlider.value = caps.zoom.min;
      zoomRow.style.display = 'flex';
    } else {
      zoomRow.style.display = 'none';
    }
  } catch(err){
    zoomRow.style.display = 'none';
  }
}

zoomSlider.addEventListener('input', async () => {
  if(!cameraTrack) return;
  try{
    await cameraTrack.applyConstraints({ advanced: [{ zoom: parseFloat(zoomSlider.value) }] });
  } catch(err){ /* 미지원 기기는 무시 */ }
});

let autoFocusIntervalId = null;

async function tryEnableContinuousFocus(){
  if(!cameraTrack || !cameraTrack.getCapabilities) return;
  try{
    const caps = cameraTrack.getCapabilities();
    if(caps.focusMode && caps.focusMode.includes('continuous')){
      await cameraTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
    } else if(caps.focusMode && caps.focusMode.includes('single-shot')){
      // 연속 초점을 지원하지 않는 기기는 주기적으로 단발 초점을 자동으로 다시 걸어줌
      autoFocusIntervalId = setInterval(async () => {
        try{ await cameraTrack.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] }); }
        catch(e){ /* 무시 */ }
      }, 1800);
    }
  } catch(err){ /* 미지원 기기는 무시 */ }
}

async function tapToRefocus(e){
  if(!cameraTrack || !cameraTrack.getCapabilities) return;
  try{
    const caps = cameraTrack.getCapabilities();
    if(caps.focusMode && (caps.focusMode.includes('single-shot') || caps.focusMode.includes('manual'))){
      const rect = video.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      const mode = caps.focusMode.includes('single-shot') ? 'single-shot' : 'manual';
      const constraint = { advanced: [{ focusMode: mode }] };
      if(caps.pointsOfInterest){
        constraint.advanced[0].pointsOfInterest = [{ x, y }];
      }
      await cameraTrack.applyConstraints(constraint);
      setScanStatus('초점을 다시 맞췄어요...');
      setTimeout(() => { if(cameraStream) setScanStatus('카메라를 비춰주세요...'); }, 1200);
    } else {
      setScanStatus('이 기기는 탭 초점을 지원하지 않아요. "다시 시작" 버튼을 눌러보세요.', 'error');
    }
  } catch(err){ /* 미지원 기기는 무시 */ }
}
videoWrap.addEventListener('click', tapToRefocus);

function stopCamera(){
  if(cameraLoopId) cancelAnimationFrame(cameraLoopId);
  cameraLoopId = null;
  if(autoFocusIntervalId){ clearInterval(autoFocusIntervalId); autoFocusIntervalId = null; }
  if(cameraStream){
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
    cameraTrack = null;
  }
  videoWrap.classList.remove('active');
  videoHint.style.display = 'none';
  cameraRestartBtn.style.display = 'none';
  zoomRow.style.display = 'none';
  cameraBtn.textContent = '카메라로 스캔';
}

function cameraLoop(){
  if(video.readyState === video.HAVE_ENOUGH_DATA){
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    // 화면 가이드 박스와 비슷한 비율로 중앙을 잘라내어 인식 (배경 잡음 제거 + 효과적인 확대)
    const side = Math.floor(Math.min(vw, vh) * 0.62);
    const sx = Math.floor((vw - side) / 2);
    const sy = Math.floor((vh - side) / 2);
    hiddenCanvas.width = side;
    hiddenCanvas.height = side;
    hiddenCtx.drawImage(video, sx, sy, side, side, 0, 0, side, side);
    const imageData = hiddenCtx.getImageData(0, 0, side, side);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if(code && code.data){
      showResult(code.data);
      stopCamera();
      return;
    }
  }
  cameraLoopId = requestAnimationFrame(cameraLoop);
}

cameraBtn.addEventListener('click', () => {
  if(cameraStream){
    stopCamera();
  } else {
    startCamera();
  }
});

cameraRestartBtn.addEventListener('click', () => {
  stopCamera();
  startCamera();
});

/* ---- 초기화 ---- */
const resetBtn = document.getElementById('resetBtn');
resetBtn.addEventListener('click', () => {
  // 생성 패널 초기화
  input.value = '';
  sizeSelect.value = '300';
  qrBox.innerHTML = '';
  qrBox.style.display = 'none';
  downloadBtn.style.display = 'none';
  setGenStatus('');

  // 인식 패널 초기화
  stopCamera();
  fileInput.value = '';
  pastezone.innerHTML = '';
  resultBox.style.display = 'none';
  resultText.textContent = '';
  lastDecodedText = '';
  lastDecodedUrl = null;
  setScanStatus('');
});
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
